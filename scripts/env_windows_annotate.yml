name: Scalabel-Annotate
channels:
  - conda-forge
  - defaults
dependencies:
  - pip
  - python=3.8.13
  - setuptools=58.0.4
  - wheel=0.37.1
  - pip:
      # Dev & lint tools
      - black==21.4b2
      - isort==5.10.1
      - mypy==0.942
      - pylint==2.13.4
      - pydocstyle==6.1.1
      - pytest==7.1.1
      # Web server
      - flask==2.1.1
      - flask-cors==3.0.10
      - werkzeug==2.1.2        # flask==2.1.1 is incompatible with werkzeug>=2.2
      # Data & storage
      - boto3==1.21.32
      - redis==4.2.2
      - requests==2.27.1
      - pyyaml==6.0
      - protobuf==3.20.0
      # Core data science
      - numpy==1.21.0
      - pandas==1.4.1
      - scipy==1.8.0
      - scikit-image==0.19.2
      - matplotlib==3.4.3
      - pillow==9.1.0
      # Annotation & label utilities
      - pycocotools>=2.0.6   # 2.0.4 fails to compile on Windows; 2.0.6+ has Windows wheels
      - motmetrics==1.2.0
      - plyfile==0.7.4
      - cython==0.29.24
      # Utilities
      - coloredlogs==15.0.1
      - joblib==1.1.0
      - nanoid==2.0.0
      - psutil==5.9.0
      - pydantic==1.9.0
      - python-dateutil==2.8.2
      - pyparsing==3.0.7
      - tabulate==0.8.9
      - tenacity==8.0.1
      - tqdm==4.63.1
